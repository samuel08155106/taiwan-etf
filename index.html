<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>台灣 ETF 查詢系統</title>
<style>
:root{--bg:#0f172a;--card:#1e293b;--border:#334155;--blue:#3b82f6;--blue-light:#60a5fa;--green:#22c55e;--red:#ef4444;--text:#e2e8f0;--muted:#94a3b8;--accent:#1e3a5f;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:linear-gradient(135deg,#1e3a5f,#0f2744);padding:20px 16px 16px;border-bottom:2px solid var(--blue);}
header h1{font-size:1.5rem;color:var(--blue-light);text-align:center;}
header p{text-align:center;color:var(--muted);font-size:0.8rem;margin-top:4px;}
.search-wrap{padding:16px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.search-row{display:flex;gap:8px;max-width:600px;margin:0 auto;}
.search-row input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-size:1rem;outline:none;transition:border-color 0.2s;}
.search-row input:focus{border-color:var(--blue);}
.search-row input::placeholder{color:var(--muted);}
.search-row button{background:var(--blue);color:white;border:none;border-radius:10px;padding:12px 20px;font-size:0.95rem;cursor:pointer;transition:background 0.2s;}
.search-row button:hover{background:#2563eb;}
.search-row button:disabled{background:var(--border);cursor:not-allowed;}
.popular-tags{display:flex;flex-wrap:wrap;gap:6px;max-width:600px;margin:10px auto 0;}
.tag{background:var(--accent);color:var(--blue-light);border:1px solid var(--blue);border-radius:20px;padding:4px 12px;font-size:0.78rem;cursor:pointer;transition:all 0.2s;}
.tag:hover{background:var(--blue);color:white;}
main{max-width:900px;margin:0 auto;padding:16px;}
.status-box{text-align:center;padding:60px 20px;color:var(--muted);}
.status-box .icon{font-size:3rem;margin-bottom:12px;}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.etf-header{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px;}
.etf-title-row{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.etf-code{font-size:1.8rem;font-weight:bold;color:var(--blue-light);}
.etf-name{font-size:1rem;color:var(--muted);margin-top:2px;}
.price-block{text-align:right;}
.price-now{font-size:2rem;font-weight:bold;}
.price-change{font-size:0.9rem;margin-top:2px;}
.up{color:var(--red);}
.down{color:var(--green);}
.flat{color:var(--muted);}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;}
.stat-card .label{font-size:0.75rem;color:var(--muted);margin-bottom:4px;}
.stat-card .value{font-size:1.1rem;font-weight:bold;color:var(--text);}
.stat-card .value.up{color:var(--red);}
.stat-card .value.down{color:var(--green);}
.section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;}
.section h3{font-size:1rem;color:var(--blue-light);margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.section h3 .badge{background:var(--accent);color:var(--blue-light);border-radius:20px;padding:2px 10px;font-size:0.75rem;}
.holdings-table{width:100%;border-collapse:collapse;font-size:0.85rem;}
.holdings-table th{color:var(--muted);font-weight:normal;padding:6px 8px;text-align:left;border-bottom:1px solid var(--border);}
.holdings-table td{padding:8px;border-bottom:1px solid #1e293b;}
.holdings-table tr:last-child td{border-bottom:none;}
.holdings-table tr:hover td{background:#263548;}
.bar-wrap{display:flex;align-items:center;gap:8px;}
.bar{height:6px;background:var(--blue);border-radius:3px;min-width:2px;}
.pct-text{font-size:0.8rem;color:var(--muted);white-space:nowrap;}
.note{background:#1c2a1c;border:1px solid #22c55e44;border-radius:8px;padding:10px 14px;font-size:0.78rem;color:#86efac;margin-bottom:14px;}
.warn-note{background:#2a1c1c;border:1px solid #ef444444;border-radius:8px;padding:10px 14px;font-size:0.78rem;color:#fca5a5;margin-bottom:14px;}
.info-note{background:#1c2233;border:1px solid #3b82f644;border-radius:8px;padding:10px 14px;font-size:0.78rem;color:#93c5fd;margin-bottom:14px;}
.hist-table{width:100%;border-collapse:collapse;font-size:0.82rem;}
.hist-table th{color:var(--muted);font-weight:normal;padding:5px 8px;text-align:right;border-bottom:1px solid var(--border);}
.hist-table th:first-child{text-align:left;}
.hist-table td{padding:6px 8px;border-bottom:1px solid #1e293b;text-align:right;}
.hist-table td:first-child{text-align:left;color:var(--muted);}
.hist-table tr:hover td{background:#263548;}
footer{text-align:center;padding:20px;color:var(--muted);font-size:0.75rem;border-top:1px solid var(--border);margin-top:20px;}
footer a{color:var(--blue-light);}
@media(max-width:480px){.etf-code{font-size:1.4rem;}.price-now{font-size:1.6rem;}.holdings-table,.hist-table{font-size:0.76rem;}}
</style>
</head>
<body>
<header>
  <h1>🇹🇼 台灣 ETF 查詢系統</h1>
  <p>股價：Yahoo Finance ｜ 歷史：TWSE ｜ 持股：MoneyDJ / 投信官網</p>
</header>
<div class="search-wrap">
  <div class="search-row">
    <input type="text" id="searchInput" placeholder="輸入 ETF 代號，例如 0050" maxlength="10"/>
    <button id="searchBtn" onclick="searchETF()">查詢</button>
  </div>
  <div class="popular-tags">
    <span class="tag" onclick="quickSearch('0050')">0050 元大台灣50</span>
    <span class="tag" onclick="quickSearch('0056')">0056 元大高股息</span>
    <span class="tag" onclick="quickSearch('00878')">00878 國泰永續高股息</span>
    <span class="tag" onclick="quickSearch('00919')">00919 群益台灣精選高息</span>
    <span class="tag" onclick="quickSearch('006208')">006208 富邦台50</span>
    <span class="tag" onclick="quickSearch('00929')">00929 復華台灣科技優息</span>
    <span class="tag" onclick="quickSearch('00940')">00940 元大台灣價值高息</span>
    <span class="tag" onclick="quickSearch('00713')">00713 元大台灣高息低波</span>
  </div>
</div>
<main id="main">
  <div class="status-box">
    <div class="icon">🔍</div>
    <p>輸入 ETF 代號開始查詢</p>
    <p style="font-size:0.8rem;margin-top:8px;">支援台灣上市上櫃 ETF，例如 0050、0056、00878</p>
  </div>
</main>
<footer>
  股價資料：<a href="https://finance.yahoo.com" target="_blank">Yahoo Finance</a> ｜
  歷史資料：<a href="https://www.twse.com.tw" target="_blank">台灣證券交易所 TWSE</a><br>
  本工具僅供參考，不構成投資建議。
</footer>

<script>
// ── 工具函式 ──────────────────────────────────────────
function fmt(n,dec=2){
  if(n==null||isNaN(n))return'—';
  return Number(n).toLocaleString('zh-TW',{minimumFractionDigits:dec,maximumFractionDigits:dec});
}
function fmtK(n){
  if(n==null||isNaN(n))return'—';
  const v=Number(n);
  if(v>=1e8)return(v/1e8).toFixed(2)+' 億';
  if(v>=1e4)return(v/1e4).toFixed(2)+' 萬';
  return v.toLocaleString();
}
function updown(v){return v>0?'up':v<0?'down':'flat';}
function updownSign(v){
  if(v>0)return'▲ +'+fmt(v);
  if(v<0)return'▼ '+fmt(v);
  return'— '+fmt(v);
}
function quickSearch(code){
  document.getElementById('searchInput').value=code;
  searchETF();
}
document.getElementById('searchInput').addEventListener('keydown',e=>{
  if(e.key==='Enter')searchETF();
});

// ── 主查詢 ────────────────────────────────────────────
async function searchETF(){
  const code=document.getElementById('searchInput').value.trim().toUpperCase();
  if(!code)return;
  // 更新 URL 參數（方便分享）
  const url=new URL(window.location);
  url.searchParams.set('code',code);
  window.history.replaceState({},'',url);

  const main=document.getElementById('main');
  main.innerHTML='<div class="status-box"><div class="spinner"></div><p>查詢中，請稍候…</p></div>';
  document.getElementById('searchBtn').disabled=true;

  try{
    const [quote,history]=await Promise.all([
      fetchYahooQuote(code),
      fetchTWSEHistory(code)
    ]);
    
    // Debug log
    console.log('[DEBUG] quote:', quote);
    console.log('[DEBUG] history:', history);
    console.log('[DEBUG] quote?.meta:', quote?.meta);
    console.log('[DEBUG] history?.data?.length:', history?.data?.length);
    
    // 只要任一來源有資料就顯示，不需要兩個都有
    const hasQuote = quote && quote.meta;
    const hasHistory = history && history.data && history.data.length > 0;
    
    console.log('[DEBUG] hasQuote:', hasQuote);
    console.log('[DEBUG] hasHistory:', hasHistory);
    
    if(!hasQuote && !hasHistory){
      main.innerHTML=`<div class="status-box"><div class="icon">❌</div><p>找不到代號 <strong>${code}</strong> 的 ETF</p><p style="font-size:0.8rem;margin-top:8px;">請確認代號是否正確，例如 0050、00878</p></div>`;
      return;
    }
    await renderAll(code,quote,history);
  }catch(e){
    main.innerHTML=`<div class="status-box"><div class="icon">⚠️</div><p>查詢失敗，請稍後再試</p><p style="font-size:0.8rem;margin-top:8px;">${e.message}</p></div>`;
  }finally{
    document.getElementById('searchBtn').disabled=false;
  }
}

// ── Yahoo Finance 即時報價（透過 CORS proxy）────────
async function fetchYahooQuote(code){
  // 使用 allorigins.win CORS proxy
  const PROXY = 'https://api.allorigins.win/raw?url=';
  
  // 先試上市 .TW，再試上櫃 .TWO
  for(const suffix of['.TW','.TWO']){
    try{
      const apiUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${code}${suffix}?interval=1d&range=5d&includePrePost=false`;
      const url = PROXY + encodeURIComponent(apiUrl);
      console.log('[DEBUG] fetchYahooQuote trying:', code + suffix);
      const r = await fetch(url);
      console.log('[DEBUG] response status:', r.status);
      if(!r.ok) continue;
      const d = await r.json();
      const result = d?.chart?.result?.[0];
      const price = result?.meta?.regularMarketPrice;
      console.log('[DEBUG] price:', price);
      
      if(result && result.meta && price != null){
        result._suffix = suffix;
        console.log('[DEBUG] Yahoo SUCCESS');
        return result;
      }
    }catch(e){
      console.log('[DEBUG] Yahoo error:', e.message);
    }
  }
  console.log('[DEBUG] Yahoo FAILED');
  return null;
}

// ── TWSE 歷史月資料 ───────────────────────────────────
async function fetchTWSEHistory(code){
  try{
    const url=`https://www.twse.com.tw/rwd/zh/afterTrading/STOCK_DAY?stockNo=${code}&response=json`;
    const r=await fetch(url);
    if(!r.ok)return null;
    const d=await r.json();
    if(d.stat!=='OK'||!d.data||d.data.length===0)return null;
    return d;
  }catch(e){return null;}
}

// ── ETF 發行商對應表 ──────────────────────────────────
const ETF_ISSUERS = {
  '元大': {
    codes: /^(0050|0051|0052|0053|0054|0055|0056|0057|006|00[67])/,
    name: '元大投信',
    holdingsUrl: (code) => `https://www.yuantaetfs.com/api/StkWeights/${code}`
  },
  '國泰': {
    codes: /^007/,
    name: '國泰投信',
    holdingsUrl: (code) => `https://www.cathaysite.com.tw/funds/etf/${code}/holdings`
  },
  '富邦': {
    codes: /^00[89]/,
    name: '富邦投信',
    holdingsUrl: (code) => `https://www.fubon.com/etf/api/holdings/${code}`
  }
};

// 判斷 ETF 發行商
function getETFIssuer(code){
  for(const [key, issuer] of Object.entries(ETF_ISSUERS)){
    if(issuer.codes.test(code)) return issuer;
  }
  return null;
}

// ── 從投信官網抓持股（優先）──────────────────────────
async function fetchIssuerHoldings(code){
  const issuer = getETFIssuer(code);
  if(!issuer){
    console.log('[DEBUG] Unknown issuer for:', code);
    return null;
  }
  
  try{
    const PROXY = 'https://api.allorigins.win/raw?url=';
    const url = issuer.holdingsUrl(code);
    console.log('[DEBUG] Trying issuer API:', issuer.name, url);
    
    const r = await fetch(PROXY + encodeURIComponent(url));
    if(!r.ok) return null;
    
    const data = await r.json();
    console.log('[DEBUG] Issuer API response:', data);
    
    // 這裡需要根據各投信的 API 格式解析
    // 目前先返回 null，讓它 fallback 到 MoneyDJ
    return null;
  }catch(e){
    console.log('[DEBUG] Issuer API error:', e.message);
    return null;
  }
}

// ── MoneyDJ 持股明細（備用）──────────────────────────
async function fetchMoneyDJHoldings(code){
  try{
    const PROXY = 'https://api.allorigins.win/raw?url=';
    const url = `https://www.moneydj.com/ETF/X/Basic/Basic0007a.xdjhtm?etfid=${code}.TW`;
    console.log('[DEBUG] fetchMoneyDJ trying:', code);
    
    const r = await fetch(PROXY + encodeURIComponent(url));
    if(!r.ok) return null;
    
    const html = await r.text();
    
    // 解析 HTML 取得持股資料
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    
    // 找資料日期
    const dateEl = doc.querySelector('#ctl00_ctl00_MainContent_MainContent_sdate3');
    const dataDate = dateEl ? dateEl.textContent.replace('資料日期：','').trim() : '';
    
    // 找持股表格
    const tables = doc.querySelectorAll('table.datalist');
    if(!tables || tables.length === 0) return null;
    
    const holdings = [];
    tables.forEach(table => {
      const rows = table.querySelectorAll('tr');
      rows.forEach((row, i) => {
        if(i === 0) return; // skip header
        const cells = row.querySelectorAll('td');
        if(cells.length >= 4){
          const name = cells[0].textContent.trim();
          const shares = cells[1].textContent.trim();
          const pct = parseFloat(cells[2].textContent.trim());
          const change = cells[3].textContent.trim();
          if(name && !isNaN(pct)){
            holdings.push({name, shares, pct, change});
          }
        }
      });
    });
    
    console.log('[DEBUG] MoneyDJ holdings:', holdings.length);
    return holdings.length > 0 ? {holdings, dataDate, source: 'MoneyDJ'} : null;
  }catch(e){
    console.log('[DEBUG] MoneyDJ error:', e.message);
    return null;
  }
}

// ── 綜合持股資料（優先投信官網，備用 MoneyDJ）────────
async function fetchHoldings(code){
  // 先試投信官網
  let data = await fetchIssuerHoldings(code);
  if(data) return data;
  
  // 再試 MoneyDJ
  return await fetchMoneyDJHoldings(code);
}

// ── 渲染全部 ──────────────────────────────────────────
async function renderAll(code,quote,history){
  const main=document.getElementById('main');
  const meta=quote?.meta||{};

  // 從 Yahoo Finance 取價格，若無則從 TWSE history 補
  const histLast = history?.data?.[history.data.length-1];
  const price = meta.regularMarketPrice ?? (histLast ? parseFloat(histLast[6].replace(/,/g,'')) : 0);
  const prevClose = meta.chartPreviousClose || meta.previousClose ||
    (histLast ? parseFloat(histLast[6].replace(/,/g,'')) - parseFloat((histLast[7]||'0').replace(/,/g,'').replace('X','')) : 0);
  const change=price-prevClose;
  const changePct=prevClose?(change/prevClose*100):0;
  const high = meta.regularMarketDayHigh || (histLast ? parseFloat(histLast[4].replace(/,/g,'')) : 0);
  const low  = meta.regularMarketDayLow  || (histLast ? parseFloat(histLast[5].replace(/,/g,'')) : 0);
  const open = meta.regularMarketOpen    || (histLast ? parseFloat(histLast[3].replace(/,/g,'')) : 0);
  const volume = meta.regularMarketVolume || (histLast ? parseInt(histLast[1].replace(/,/g,'')) : 0);
  const marketCap=meta.marketCap||0;
  const fiftyTwoHigh=meta.fiftyTwoWeekHigh||0;
  const fiftyTwoLow=meta.fiftyTwoWeekLow||0;
  const navPrice=meta.navPrice||0;
  const suffix=quote?._suffix||'.TW';

  // 名稱：優先用 TWSE title，再用 Yahoo
  const histTitle=history?.title?.replace(/個股日成交資訊|各日成交資訊|每日收盤行情/g,'').trim()||'';
  const yahooName=meta.shortName||meta.longName||'';
  const displayName=histTitle||yahooName||code;

  const cls=updown(change);
  const dataDate=meta.regularMarketTime
    ?new Date(meta.regularMarketTime*1000).toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit'})
    :(history?.data?.[history.data.length-1]?.[0]||'');

  main.innerHTML=`
    <div class="note">📡 股價：Yahoo Finance ｜ 歷史：TWSE ｜ 持股：MoneyDJ（每月更新）｜ 資料日期：${dataDate}</div>

    <div class="etf-header">
      <div class="etf-title-row">
        <div>
          <div class="etf-code">${code}</div>
          <div class="etf-name">${displayName}</div>
          <div style="font-size:0.75rem;color:var(--muted);margin-top:4px;">${meta.currency||'TWD'} ｜ ${meta.exchangeName||'TWSE'}</div>
        </div>
        <div class="price-block">
          <div class="price-now ${cls}">${fmt(price)}</div>
          <div class="price-change ${cls}">${updownSign(change)} (${change>=0?'+':''}${fmt(changePct)}%)</div>
          ${navPrice?`<div style="font-size:0.78rem;color:var(--muted);margin-top:4px;">淨值 ${fmt(navPrice)}</div>`:''}
        </div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card"><div class="label">昨日收盤</div><div class="value">${fmt(prevClose)}</div></div>
      <div class="stat-card"><div class="label">今日開盤</div><div class="value">${fmt(open)}</div></div>
      <div class="stat-card"><div class="label">今日最高</div><div class="value up">${fmt(high)}</div></div>
      <div class="stat-card"><div class="label">今日最低</div><div class="value down">${fmt(low)}</div></div>
      <div class="stat-card"><div class="label">成交量（股）</div><div class="value">${fmtK(volume)}</div></div>
      <div class="stat-card"><div class="label">成交量（張）</div><div class="value">${fmtK(Math.floor(volume/1000))}</div></div>
      <div class="stat-card"><div class="label">52週最高</div><div class="value up">${fmt(fiftyTwoHigh)}</div></div>
      <div class="stat-card"><div class="label">52週最低</div><div class="value down">${fmt(fiftyTwoLow)}</div></div>
      ${marketCap?`<div class="stat-card"><div class="label">基金規模</div><div class="value">${fmtK(marketCap)}</div></div>`:''}
    </div>

    <div id="holdingsSection">
      <div class="section"><h3>📦 持股明細</h3><div class="spinner" style="margin:20px auto;"></div></div>
    </div>
    <div id="histSection"></div>
  `;

  // 並行：持股 + 歷史
  const [holdings]=await Promise.all([
    fetchHoldings(code),
    Promise.resolve(renderHistory(history))
  ]);
  renderHoldings(holdings,code);
}

// ── 渲染持股明細 ──────────────────────────────────────
function renderHoldings(data,code){
  const el=document.getElementById('holdingsSection');
  if(!data){
    el.innerHTML=`
      <div class="section">
        <h3>📦 持股明細</h3>
        <div class="warn-note">⚠️ 持股資料無法取得（可能限流或該 ETF 無資料）。</div>
        <div class="info-note">
          📌 可至以下連結查詢完整持股：<br>
          • <a href="https://www.moneydj.com/ETF/X/Basic/Basic0007a.xdjhtm?etfid=${code}.TW" target="_blank" style="color:var(--blue-light)">MoneyDJ ${code} 持股</a><br>
          • <a href="https://www.twse.com.tw/zh/ETF/etf.html" target="_blank" style="color:var(--blue-light)">TWSE ETF 專區</a>（官方）
        </div>
      </div>`;
    return;
  }

  const {holdings, dataDate, source = 'MoneyDJ'} = data;
  
  if(!holdings || holdings.length === 0){
    el.innerHTML=`<div class="section"><h3>📦 持股明細</h3>
      <div class="info-note">ℹ️ 該 ETF 暫無持股資料。<a href="https://www.moneydj.com/ETF/X/Basic/Basic0007a.xdjhtm?etfid=${code}.TW" target="_blank" style="color:var(--blue-light)">前往 MoneyDJ 查詢</a></div>
    </div>`;
    return;
  }

  // 計算最大佔比（用於 bar）
  const maxPct = Math.max(...holdings.map(h => h.pct));

  let rows = '';
  holdings.forEach((h, i) => {
    const barW = maxPct > 0 ? Math.max(2, (h.pct / maxPct) * 80) : 2;
    const changeClass = h.change.includes('+') ? 'up' : h.change.includes('-') ? 'down' : 'flat';
    rows += `<tr>
      <td style="color:var(--muted);font-size:0.78rem;">${i+1}</td>
      <td><strong>${h.name}</strong></td>
      <td style="text-align:right;color:var(--muted);font-size:0.82rem;">${h.shares}</td>
      <td><div class="bar-wrap"><div class="bar" style="width:${barW}px"></div><span class="pct-text">${h.pct}%</span></div></td>
      <td class="${changeClass}" style="text-align:right;font-size:0.82rem;">${h.change}</td>
    </tr>`;
  });

  el.innerHTML = `
    <div class="section">
      <h3>📦 持股明細 <span class="badge">${holdings.length} 檔</span></h3>
      <div class="info-note">ℹ️ 資料來源：${source} ｜ 資料日期：${dataDate || '未知'}</div>
      <div style="overflow-x:auto;">
        <table class="holdings-table">
          <thead><tr><th>#</th><th>股票名稱</th><th>持股（千股）</th><th>佔比</th><th>增減</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

// ── 渲染歷史資料 ──────────────────────────────────────
function renderHistory(history){
  const el=document.getElementById('histSection');
  if(!history||!history.data||history.data.length===0){el.innerHTML='';return;}

  // [日期, 成交股數, 成交金額, 開盤, 最高, 最低, 收盤, 漲跌, 成交筆數]
  const rows=[...history.data].reverse();
  let tableRows='';
  rows.forEach(r=>{
    const chg=r[7]||'—';
    const isUp=chg.startsWith('+');
    const isDown=chg.startsWith('-');
    const cls=isUp?'up':isDown?'down':'flat';
    const vol=r[1]?Math.floor(Number(r[1].replace(/,/g,''))/1000).toLocaleString()+' 張':'—';
    tableRows+=`<tr>
      <td>${r[0]}</td>
      <td>${r[6]}</td>
      <td class="${cls}">${chg}</td>
      <td>${r[3]}</td>
      <td class="up">${r[4]}</td>
      <td class="down">${r[5]}</td>
      <td style="color:var(--muted);font-size:0.78rem;">${vol}</td>
    </tr>`;
  });

  el.innerHTML=`
    <div class="section">
      <h3>📅 本月歷史收盤 <span class="badge">TWSE</span></h3>
      <div style="overflow-x:auto;">
        <table class="hist-table">
          <thead><tr>
            <th style="text-align:left">日期</th>
            <th>收盤</th><th>漲跌</th><th>開盤</th>
            <th>最高</th><th>最低</th><th>成交量</th>
          </tr></thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
    </div>`;
}

// ── URL 參數自動查詢 ──────────────────────────────────
window.addEventListener('load',()=>{
  const params=new URLSearchParams(window.location.search);
  const code=params.get('code')||params.get('etf');
  if(code){document.getElementById('searchInput').value=code;searchETF();}
});
</script>
